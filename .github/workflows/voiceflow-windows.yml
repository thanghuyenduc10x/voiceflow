name: "VoiceFlow Windows Build"

# Builds the Windows installer (.exe) on demand for quick testing.
# Releases are handled by release.yml (tag-triggered, all platforms), so this
# is manual-only to avoid a redundant paid Windows build on every push to main.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      platform: "windows-latest"
      target: "x86_64-pc-windows-msvc"
      build-args: ""
      upload-artifacts: true
      sign-binaries: false
      asset-prefix: "voiceflow"
    # Updater (minisign) signing needs the TAURI_SIGNING_* secrets — without
    # this the key arrives empty and signing fails ("Missing comment in secret key").
    secrets: inherit
